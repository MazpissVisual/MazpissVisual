<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Courier New',monospace">
  <!--
    =========================================================
     GANTI TEKS:
       - Judul besar  : cari 3x "WILDAN NIAM" (layer glitch) -> ganti semua
       - Subtitle     : cari "AI RESEARCHER // WEB3 BUILDER"
       - Handle bar   : cari "wildanniam@github: ~/profile"
       - Baris boot    : cari class="boot" (4 baris)
     GANTI WARNA (opsional): ubah nilai variabel warna di dalam blok <style> (cyan / mag / purple / green)
    =========================================================
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000000" opacity="0.25"/>
    </pattern>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    :root{
      --cyan:#00e5ff;
      --mag:#ff2e97;
      --purple:#8b5cf6;
      --green:#3fb950;
      --dim:#7d8590;
      --fg:#e6edf3;
    }
    text{ font-family:'JetBrains Mono','Courier New',monospace; }

    /* --- title glitch: RGB split --- */
    .g-cyan{ fill:var(--cyan); animation:gc 2.6s infinite steps(1); }
    .g-mag { fill:var(--mag);  animation:gm 2.6s infinite steps(1); }
    .g-fg  { fill:var(--fg); }
    @keyframes gc{
      0%,7%,100%{transform:translate(0,0);opacity:.9}
      8%{transform:translate(-3px,1px);opacity:.9}
      9%{transform:translate(2px,-1px)}
      42%{transform:translate(0,0)}
      43%{transform:translate(-2px,0)}
      44%{transform:translate(0,0)}
      70%{transform:translate(0,0)}
      71%{transform:translate(3px,1px)}
      72%{transform:translate(0,0)}
    }
    @keyframes gm{
      0%,7%,100%{transform:translate(0,0);opacity:.8}
      8%{transform:translate(3px,-1px);opacity:.8}
      9%{transform:translate(-2px,1px)}
      42%{transform:translate(0,0)}
      43%{transform:translate(2px,0)}
      44%{transform:translate(0,0)}
      70%{transform:translate(0,0)}
      71%{transform:translate(-3px,-1px)}
      72%{transform:translate(0,0)}
    }
    /* full-title occasional flicker */
    .title-wrap{ animation:tflick 5s infinite; }
    @keyframes tflick{
      0%,96%,100%{opacity:1}
      97%{opacity:.35}
      98%{opacity:1}
      99%{opacity:.6}
    }

    /* --- boot lines appear one by one --- */
    .boot{ opacity:0; animation:reveal .4s forwards; }
    .b1{ animation-delay:.2s } .b2{ animation-delay:.7s }
    .b3{ animation-delay:1.2s } .b4{ animation-delay:1.7s }
    @keyframes reveal{ from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }

    /* --- blinking cursor --- */
    .cursor{ animation:blink 1s steps(1) infinite; }
    @keyframes blink{ 50%{opacity:0} }

    /* --- moving scan bar --- */
    .scanbar{ animation:scan 3.5s linear infinite; }
    @keyframes scan{ 0%{transform:translateY(-30px)} 100%{transform:translateY(260px)} }

    /* --- glitch slice bars --- */
    .slice{ opacity:0; animation:slice 4s infinite; }
    .s2{ animation-delay:1.3s } .s3{ animation-delay:2.6s }
    @keyframes slice{
      0%,3%,100%{opacity:0;transform:translateX(0)}
      1%{opacity:.5;transform:translateX(-14px)}
      2%{opacity:.5;transform:translateX(10px)}
    }

    /* status dot pulse */
    .pulse{ animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse{ 0%,100%{opacity:.35} 50%{opacity:1} }
  </style>

  <!-- background -->
  <rect width="900" height="260" rx="12" fill="url(#bg)"/>
  <rect width="900" height="260" rx="12" fill="url(#grid)"/>

  <!-- terminal title bar -->
  <rect x="0" y="0" width="900" height="34" rx="12" fill="#161b22"/>
  <rect x="0" y="22" width="900" height="12" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="17" r="6" fill="#27c93f"/>
  <text x="450" y="21" text-anchor="middle" font-size="12" fill="#7d8590">mazpissvisual@github: ~/profile</text>

  <!-- boot sequence lines -->
  <g font-size="13" fill="#7d8590">
    <text class="boot b1" x="28" y="64">$ initializing profile<tspan fill="#3fb950">...</tspan> <tspan fill="#3fb950">[OK]</tspan></text>
    <text class="boot b2" x="28" y="86">$ loading modules: <tspan fill="#00e5ff">ui_ux</tspan> <tspan fill="#8b5cf6">web_dev</tspan> <tspan fill="#00e5ff">vibe_coding</tspan></text>
    <text class="boot b3" x="28" y="108">$ mounting neural_link<tspan fill="#3fb950">...</tspan> <tspan fill="#3fb950">[OK]</tspan></text>
    <text class="boot b4" x="28" y="130">$ render identity <tspan class="cursor" fill="#00e5ff">_</tspan></text>
  </g>

  <!-- GLITCH TITLE (3 stacked layers) -->
  <g class="title-wrap" filter="url(#glow)">
    <text class="g-mag"  x="28" y="188" font-size="40" font-weight="700">HAVIDZ IQBAL</text>
    <text class="g-cyan" x="28" y="188" font-size="40" font-weight="700">HAVIDZ IQBAL</text>
    <text class="g-fg"   x="28" y="188" font-size="40" font-weight="700">HAVIDZ IQBAL</text>
  </g>

  <!-- subtitle -->
  <text x="30" y="216" font-size="14" fill="#8b5cf6" letter-spacing="1.5">UI/UX <tspan fill="#7d8590">//</tspan> WEB DEV <tspan fill="#7d8590">//</tspan> VIBE CODER</text>

  <!-- status -->
  <g transform="translate(720,178)">
    <circle class="pulse" cx="0" cy="0" r="5" fill="#3fb950"/>
    <text x="14" y="4" font-size="13" fill="#3fb950" letter-spacing="1">SYSTEM ONLINE</text>
    <text x="14" y="24" font-size="11" fill="#7d8590">agents: autonomous</text>
  </g>

  <!-- glitch slice bars -->
  <g>
    <rect class="slice s1" x="28" y="160" width="360" height="8" fill="#00e5ff" opacity="0"/>
    <rect class="slice s2" x="28" y="176" width="300" height="6" fill="#ff2e97" opacity="0"/>
    <rect class="slice s3" x="28" y="150" width="200" height="5" fill="#8b5cf6" opacity="0"/>
  </g>

  <!-- scanlines overlay -->
  <rect x="0" y="34" width="900" height="226" fill="url(#scanlines)"/>
  <!-- moving scan bar -->
  <rect class="scanbar" x="0" y="0" width="900" height="30" fill="url(#scanGrad)" opacity="0.35"/>

  <!-- neon border -->
  <rect x="1" y="1" width="898" height="258" rx="12" fill="none" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
